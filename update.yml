name: 每日更新直播源

on:
  schedule:
    - cron: '22 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: pip install -r requirements.txt
        
      - name: 运行处理脚本
        run: python process.py
        
      - name: 提交并推送更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tv.txt tv.m3u
          git diff --staged --quiet || git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M')"
          git push
